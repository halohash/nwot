<!DOCTYPE html>
<!-- ai slop below lmao -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nickname Settings</title>

<!-- 95.css -->
<link rel="stylesheet" href="https://unpkg.com/95.css">

<style>
@font-face {
    font-family: "RobotoThin";
    src: url("https://file.garden/aUYIWVAKvQxCBY-_/fonts/roboto-2011/Roboto-Thin.ttf");
}

body {
    margin: 0;
    height: 100vh;
    font-family: "RobotoThin", sans-serif;
    background-image: url("https://file.garden/aUYIWVAKvQxCBY-_/database/wallpapers/owoh.png");
    background-size: cover;
    background-repeat: no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
}

.window {
    width: 320px;
}

.status {
    margin-top: 10px;
    font-size: 12px;
}
</style>
</head>
<body>

<div class="window">
    <div class="title-bar">
        <div class="title-bar-text">Nickname Settings</div>
        <div class="title-bar-controls">
            <button aria-label="Close" onclick="window.close()"></button>
        </div>
    </div>

    <div class="window-body">
        <label for="nickname">Enter nickname:</label>
        <input id="nickname" type="text" style="width: 100%; margin-top: 5px;" />

        <div style="margin-top: 10px; display: flex; gap: 5px;">
            <button onclick="saveNickname()">Save</button>
            <button onclick="loadNickname()">Load</button>
            <button onclick="clearNickname()">Clear</button>
        </div>

        <div class="status" id="status"></div>
    </div>
</div>

<script>
function saveNickname() {
    const value = document.getElementById("nickname").value.trim();
    if (!value) {
        setStatus("Please enter a nickname.");
        return;
    }

    localStorage.setItem("nickname", value);
    setStatus("Saved!");
}

function loadNickname() {
    const value = localStorage.getItem("nickname");
    if (value) {
        document.getElementById("nickname").value = value;
        setStatus("Loaded from localStorage.");
    } else {
        setStatus("No nickname saved.");
    }
}

function clearNickname() {
    localStorage.removeItem("nickname");
    document.getElementById("nickname").value = "";
    setStatus("Cleared.");
}

function setStatus(msg) {
    document.getElementById("status").textContent = msg;
}

// Auto-load on page open
loadNickname();
</script>

</body>
</html>
